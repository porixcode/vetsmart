<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #2563EB; }
      .fg { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #3B82F6; }
      .fg { fill: white; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <g transform="translate(90 95) scale(1.8)">
    <!-- Central pad -->
    <ellipse cx="0" cy="6" rx="10" ry="8" class="fg" />
    <!-- Toes -->
    <ellipse cx="-13" cy="-8" rx="5" ry="6" class="fg" transform="rotate(-20 -13 -8)" />
    <ellipse cx="13" cy="-8" rx="5" ry="6" class="fg" transform="rotate(20 13 -8)" />
    <ellipse cx="-6" cy="-15" rx="4.5" ry="5.5" class="fg" transform="rotate(-35 -6 -15)" />
    <ellipse cx="6" cy="-15" rx="4.5" ry="5.5" class="fg" transform="rotate(35 6 -15)" />
    <!-- Medical cross inside pad -->
    <rect x="-2.5" y="-1" width="5" height="9" rx="1" fill="#2563EB" />
    <rect x="-4.5" y="1" width="9" height="5" rx="1" fill="#2563EB" />
  </g>
</svg>
