name: vetsmart

services:
  postgres:
    image: postgres:16-alpine
    container_name: vetsmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Bogota}
      PGTZ: ${TZ:-America/Bogota}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - vetsmart-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vetsmart-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Bogota}
      # DATABASE_URL override: dentro del network de compose el host es "postgres"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    networks:
      - vetsmart-net

volumes:
  postgres_data:
    name: vetsmart_postgres_data

networks:
  vetsmart-net:
    name: vetsmart-net
    driver: bridge
